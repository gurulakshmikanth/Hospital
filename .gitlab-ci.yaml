stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: hospital-app

test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - python manage.py test

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE_NAME .
  only:
    - main

deploy:
  stage: deploy
  image: registry.access.redhat.com/ubi8/ubi
  script:
    - oc login --token=$OC_TOKEN --server=$OC_SERVER --insecure-skip-tls-verify=true
    - oc project kanth-project
    - oc rollout restart deployment/hospital
  only:
    - main
